<style>
:root{
  --bg:#f3efe5;--paper:#fbf9f3;--ink:#2c302b;--heading:#33493a;--muted:#73786d;
  --accent:#33493a;--accent-2:#92703c;--line:#ded6c2;
  --ok:#42604c;--ok-soft:#e9ece1;--rain:#48708c;--rain-soft:#e5ecf1;
  --amber:#92703c;--amber-soft:#f2e9d8;--warn:#9c4234;--warn-soft:#f3e3df;
  --radius:14px;--font-d:"Spectral",Georgia,serif;--font-b:"Instrument Sans",system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{-webkit-text-size-adjust:100%;}
body{font-family:var(--font-b);background:var(--bg);color:var(--ink);line-height:1.6;font-size:16px;-webkit-font-smoothing:antialiased;}
.wrap{max-width:600px;margin:0 auto;padding:20px 16px calc(40px + env(safe-area-inset-bottom));}
.icon{width:1.15em;height:1.15em;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;flex:none;vertical-align:-0.2em;}
b,strong{font-weight:700;}
a{color:var(--accent);}

.hero{text-align:center;border-top:1px solid var(--accent-2);border-bottom:1px solid var(--line);padding:22px 6px 24px;margin-bottom:22px;}
.hero .kick{font-size:.72rem;font-weight:600;text-transform:uppercase;letter-spacing:.18em;color:var(--accent-2);}
.hero h1{font-family:var(--font-d);font-weight:600;font-size:clamp(1.7rem,7vw,2.3rem);line-height:1.12;margin:.35em 0 .2em;color:var(--heading);}
.hero .sub{color:var(--muted);font-size:.95rem;}
.hero .party{margin-top:8px;font-size:.85rem;color:var(--muted);display:flex;gap:6px 14px;justify-content:center;flex-wrap:wrap;}
.hero .party span{display:inline-flex;align-items:center;gap:5px;}
.party-edit{background:none;border:none;cursor:pointer;font:inherit;color:var(--accent);display:inline-flex;align-items:center;gap:4px;padding:2px 4px;border-radius:6px;font-weight:600;}
.party-edit:hover{background:var(--ok-soft);}
.party-edit .icon{width:1em;height:1em;color:var(--accent-2);}
.edit-form{margin:-8px 0 22px;}
.edit-form h3{font-family:var(--font-d);font-weight:600;font-size:1.1rem;color:var(--heading);margin-bottom:12px;}
.edit-form label{display:block;font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:5px;}
.edit-form .fld{margin-bottom:14px;}
.edit-form input{width:100%;font:inherit;font-size:1rem;padding:10px 12px;border:1px solid var(--line);border-radius:10px;background:var(--bg);color:var(--ink);}
.edit-form input:focus{outline:2px solid var(--accent-2);outline-offset:0;border-color:var(--accent-2);}
.edit-form .btns{display:flex;gap:10px;flex-wrap:wrap;}
.edit-form button{font:inherit;font-weight:600;padding:10px 18px;border-radius:10px;cursor:pointer;border:1px solid var(--line);}
.edit-form .save{background:var(--accent);color:#fbf9f3;border-color:var(--accent);}
.edit-form .close{background:var(--paper);color:var(--muted);}

.sec-h{display:flex;align-items:center;gap:10px;margin:30px 0 12px;}
.sec-h .icon{color:var(--accent-2);width:1.3em;height:1.3em;}
.sec-h h2{font-family:var(--font-d);font-weight:600;font-size:1.3rem;color:var(--heading);}

.card{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);padding:18px;margin-bottom:14px;}
.today{border:none;border-left:4px solid var(--acc,var(--accent));border-radius:10px;background:var(--paper);box-shadow:0 2px 14px rgba(51,73,58,.07);padding:18px 18px 18px 16px;}
.today .lbl{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--acc,var(--accent-2));}
.today h3{font-family:var(--font-d);font-weight:600;font-size:1.25rem;margin:3px 0 6px;color:var(--heading);}
.today .meta{font-size:.85rem;color:var(--muted);margin-bottom:8px;}

.day{display:flex;gap:12px;align-items:flex-start;padding:14px 0;border-top:1px solid var(--line);}
.day:first-child{border-top:none;}
.day .wx{flex:none;width:74px;text-align:center;}
.day .wx .dt{font-weight:700;font-size:.82rem;color:var(--accent);}
.day .wx .ic{color:var(--accent-2);margin:3px 0;}
.day .wx .ic .icon{width:1.9em;height:1.9em;stroke-width:1.5;}
.day .wx .tp{font-weight:700;font-size:.95rem;}
.day .wx .tp small{font-weight:600;color:var(--muted);font-size:.8em;}
.day .wx .cd{font-size:.72rem;color:var(--muted);}
.day .pick{min-width:0;flex:1;}
.day .pick .nm{font-weight:700;color:var(--heading);}
.day .pick .nm .acc{display:inline-block;width:9px;height:9px;border-radius:50%;background:var(--acc,var(--accent));margin-right:6px;vertical-align:middle;}
.badges{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px;}
.badge{font-size:.7rem;font-weight:600;padding:2px 9px;border-radius:99px;background:var(--ok-soft);color:var(--ok);}
.badge.rain{background:var(--rain-soft);color:var(--rain);}
.badge.warn{background:var(--warn-soft);color:var(--warn);}
.badge.heat{background:var(--amber-soft);color:var(--amber);}
.alts{margin-top:8px;font-size:.82rem;color:var(--muted);}
.alts a{text-decoration:none;font-weight:600;color:var(--accent);}

.note{display:flex;gap:9px;background:var(--amber-soft);border-radius:10px;padding:12px 14px;font-size:.85rem;margin:8px 0 0;}
.note .icon{color:var(--amber);margin-top:.15em;}

.trip{scroll-margin-top:14px;border-top:4px solid var(--acc,var(--accent));}
.trip .tg{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--acc,var(--accent-2));}
.trip h3{font-family:var(--font-d);font-weight:600;font-size:1.18rem;color:var(--heading);margin:2px 0 8px;line-height:1.25;}
.trip p{font-size:.92rem;text-wrap:pretty;}
.facts{display:grid;grid-template-columns:1fr;gap:8px;margin-top:12px;padding-top:12px;border-top:1px solid var(--line);font-size:.86rem;}
.facts .lbl{font-size:.66rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);}
.cost{margin-top:10px;font-size:.9rem;background:var(--ok-soft);border-radius:8px;padding:8px 12px;}
.cost b{color:var(--ok);}
.links{display:flex;flex-wrap:wrap;gap:8px 18px;margin-top:12px;padding-top:11px;border-top:1px solid var(--line);font-size:.88rem;}
.links a{display:inline-flex;align-items:center;gap:6px;font-weight:600;text-decoration:none;color:var(--accent);white-space:nowrap;}
.links .icon{color:var(--acc,var(--accent-2));}

footer{margin-top:34px;padding-top:18px;border-top:1px solid var(--line);font-size:.76rem;color:var(--muted);text-align:center;text-wrap:pretty;}
.loading{text-align:center;color:var(--muted);padding:60px 0;}

.mapwrap{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);padding:14px;margin-bottom:14px;}
.map{display:block;width:100%;height:auto;border-radius:10px;}
.mapcap{font-size:.78rem;color:var(--muted);text-align:center;margin-top:9px;text-wrap:pretty;}
.mapkey{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px;}
.mapkey a{display:inline-flex;align-items:center;gap:6px;text-decoration:none;background:var(--bg);border:1px solid var(--line);border-radius:99px;padding:3px 11px 3px 3px;font-size:.78rem;line-height:1.3;}
.mapkey a .n{display:inline-flex;align-items:center;justify-content:center;width:19px;height:19px;border-radius:50%;background:var(--acc,var(--accent));color:#fbf9f3;font-weight:700;font-size:.72rem;flex:none;}
.mapkey a .t{font-weight:600;color:var(--heading);}
.mapkey a .d{color:var(--muted);}
.mapkey a.pick{border-color:var(--acc,var(--accent));box-shadow:inset 0 0 0 1px var(--acc,var(--accent));background:var(--paper);}
@media(min-width:520px){.facts{grid-template-columns:1fr 1fr;gap:10px 22px;}}
</style>
</head>

  partly:{ic:'i-cloud-sun',cs:'polojasno',de:'wolkig',en:'partly cloudy',wet:0},
  fair:{ic:'i-cloud-sun',cs:'skoro jasno',de:'meist sonnig',en:'mostly sunny',wet:0},
  clear:{ic:'i-sun',cs:'jasno',de:'sonnig',en:'sunny',wet:0}
};
const isWet = c => CAT[c] ? CAT[c].wet : 0;
const isNice = c => ['clear','fair','partly'].includes(c);

/* ===== Doporučovací jádro ===== */
function partyFlags(p){
  const kids = p.children||[];
  return {
    size:(p.adults||0)+kids.length,
    hasToddler:kids.some(a=>a<=4),
    hasYoungKid:kids.some(a=>a>=5&&a<=9),
    hasKid:kids.some(a=>a<=11),
    hasTeen:kids.some(a=>a>=12)|| (kids.length===0), // bez dětí = dospělá parta, adrenalin OK
    isGroup:((p.adults||0)+kids.length)>=8
  };
}
// tvrdé filtry pro daný den
function eligible(trip,day,fl){
  if(trip.needsClearLowWind){ if(day && (isWet(day.cat)||day.cat==='fog'||(day.windKmh&&day.windKmh>=45))) return false; }
  if(fl.hasToddler && trip.effort==='hard') return false;
  return true;
}
function scoreTrip(trip,day,fl){
  let s=0; const c=day?day.cat:null; const hot=day&&day.max>=28; const cold=day&&day.max<=12;
  if(c){
    if(['rain','heavyrain','thunder'].includes(c)){ s += (trip.indoorOrCovered||trip.rainOk)?3:-3.5; }
    else if(c==='showers'){ s += (trip.indoorOrCovered||trip.rainOk)?1:-1; }
    else if(isNice(c)){ s += trip.outdoor?2:(trip.lovesHeat?0:-1); }
  }
  if(hot){ if(trip.lovesHeat) s+=3; else if(trip.outdoor&&trip.effort!=='easy') s-=1.5; }
  if(cold){ s += trip.indoorOrCovered?1:-1; }
  if(fl.hasTeen){ if(['adrenalin','active','viewpoint'].includes(trip.category)|| ['bobsled-pec','ebikes','snezka-cablecar'].includes(trip.id)) s+=1.5; }
  if(fl.hasToddler||fl.hasYoungKid){ if(['janske-hallenbad','baumwipfelpfad','aqua-vrchlabi','aquapark-karpacz','hricky-buky'].includes(trip.id)) s+=1.5; if(trip.stairs) s-=1; }
  if(trip.byFoot) s+=0.6;
  return s;
}
function whyBadges(trip,day,fl,L){
  const w=L.why,out=[],c=day?day.cat:null,hot=day&&day.max>=28,cold=day&&day.max<=12;
  if(c&&['rain','heavyrain','thunder','showers'].includes(c)&&(trip.indoorOrCovered||trip.rainOk)) out.push({t:w.rain,k:'rain'});
  else if(hot&&trip.lovesHeat) out.push({t:w.heat,k:'heat'});
  else if(c&&isNice(c)&&trip.outdoor) out.push({t:w.clear,k:''});
  else if(cold&&trip.indoorOrCovered) out.push({t:w.cold,k:''});
  if(fl.hasTeen&&['bobsled-pec','ebikes','snezka-cablecar'].includes(trip.id)) out.push({t:w.adrenalin,k:'heat'});
  if((fl.hasToddler||fl.hasYoungKid)&&['janske-hallenbad','baumwipfelpfad','hricky-buky'].includes(trip.id)) out.push({t:w.kids,k:''});
  if(trip.byFoot) out.push({t:w.foot,k:''});
  return out.slice(0,3);
}
// plán na celý pobyt s anti-opakováním
function buildPlan(trips,days,fl){
  const used=new Set(), plan=[];
  for(const day of days){
    const ranked=trips.filter(t=>eligible(t,day,fl)).map(t=>({t,sc:scoreTrip(t,day,fl)})).sort((a,b)=>b.sc-a.sc);
    let pick=ranked.find(r=>!used.has(r.t.id))||ranked[0];
    if(pick){ used.add(pick.t.id); }
    const alts=ranked.filter(r=>pick&&r.t.id!==pick.t.id&&r.sc>0).slice(0,2).map(r=>r.t);
    plan.push({day,pick:pick?pick.t:null,alts});
  }
  return plan;
}

function fmtDate(iso,lang){const d=new Date(iso+'T00:00:00');return d.toLocaleDateString(lang==='cs'?'cs-CZ':(lang==='de'?'de-DE':'en-GB'),{weekday:'short',day:'numeric',month:'numeric'});}
function daysBetween(a,b){const out=[];let d=new Date(a+'T00:00:00Z');const e=new Date(b+'T00:00:00Z');while(d<=e){out.push(d.toISOString().slice(0,10));d.setUTCDate(d.getUTCDate()+1);}return out;}

/* ===== Přehledová mapka (self-contained inline SVG z coords v trips.json) ===== */
const VILLA_COORDS={lat:50.6255,lon:15.8136};
function mapLum(hex){ // relativní jas 0..1 pro volbu čitelné barvy čísla
  const n=parseInt(String(hex).replace('#',''),16);
  return (0.2126*((n>>16)&255)+0.7152*((n>>8)&255)+0.0722*(n&255))/255;
}
function buildMapSection(trips,plan,lang,L){
  const W=360,padX=28,padTop=26,padBot=28;
  const kx=Math.cos(VILLA_COORDS.lat*Math.PI/180);
  const proj=(lat,lon)=>({rx:lon*kx,ry:-lat});
  // body: [vila, ...výlety] – isotropní projekce, sever nahoře
  const raw=[{...proj(VILLA_COORDS.lat,VILLA_COORDS.lon),villa:true}]
    .concat(trips.map(t=>({...proj(t.coords.lat,t.coords.lon),villa:false})));
  let minRx=Infinity,maxRx=-Infinity,minRy=Infinity,maxRy=-Infinity;
  for(const p of raw){minRx=Math.min(minRx,p.rx);maxRx=Math.max(maxRx,p.rx);minRy=Math.min(minRy,p.ry);maxRy=Math.max(maxRy,p.ry);}
  const rxRange=maxRx-minRx,ryRange=maxRy-minRy;
  const scale=(W-2*padX)/Math.max(rxRange,1e-6);
  const H=Math.round(ryRange*scale+padTop+padBot);
  const pts=raw.map(p=>({x:padX+(p.rx-minRx)*scale,y:padTop+(p.ry-minRy)*scale,villa:p.villa}));
  // declutter: piny u Janských Lázní jsou nahusto → párová repulze, vila je pevná kotva
  const MIN=23;
  for(let it=0;it<120;it++){
    for(let i=0;i<pts.length;i++)for(let j=i+1;j<pts.length;j++){
      const a=pts[i],b=pts[j];
      const dx=b.x-a.x,dy=b.y-a.y,d=Math.hypot(dx,dy)||0.001;
      if(d<MIN){
        const push=(MIN-d)/2,ux=dx/d,uy=dy/d;
        if(a.villa){b.x+=ux*push*2;b.y+=uy*push*2;}
        else if(b.villa){a.x-=ux*push*2;a.y-=uy*push*2;}
        else{a.x-=ux*push;a.y-=uy*push;b.x+=ux*push;b.y+=uy*push;}
      }
    }
    for(const p of pts){if(p.villa)continue;
      p.x=Math.max(padX,Math.min(W-padX,p.x));
      p.y=Math.max(padTop,Math.min(H-padBot,p.y));}
  }
  const vx=+pts[0].x.toFixed(1),vy=+pts[0].y.toFixed(1);
  const pickIds=new Set(plan.map(p=>p.pick&&p.pick.id).filter(Boolean));
  const F='Instrument Sans,system-ui,sans-serif';
  // měřítko
  const kmPerPx=110.574/scale;
  const target=0.3*(W-2*padX)*kmPerPx;
  const barKm=[2,5,10,15].reduce((a,b)=>Math.abs(b-target)<Math.abs(a-target)?b:a);
  const barPx=barKm/kmPerPx,sx=padX,sy=H-12;
  const northLetter=lang==='cs'?'S':'N',nx=W-20;

  let svg=`<svg class="map" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="${esc(L.mapTitle)}">`
    // (a) pole
    +`<rect x="0" y="0" width="${W}" height="${H}" rx="12" fill="#f3efe5"/>`;
  // (b) spojnice vila → naplánované piny
  trips.forEach((t,i)=>{ if(!pickIds.has(t.id))return; const p=pts[i+1];
    svg+=`<line x1="${vx}" y1="${vy}" x2="${p.x.toFixed(1)}" y2="${p.y.toFixed(1)}" stroke="#92703c" stroke-opacity="0.4" stroke-width="1" stroke-dasharray="2 3"/>`;
  });
  // (c) piny výletů 1..9
  trips.forEach((t,i)=>{ const p=pts[i+1],x=p.x.toFixed(1),y=p.y.toFixed(1);
    const numFill=mapLum(t.accent)>0.62?'#2c302b':'#fff';
    svg+=`<a href="#${t.id}">`;
    if(pickIds.has(t.id)) svg+=`<circle cx="${x}" cy="${y}" r="12.5" fill="none" stroke="${t.accent}" stroke-opacity="0.35" stroke-width="3"/>`;
    svg+=`<circle cx="${x}" cy="${y}" r="9.5" fill="${t.accent}" stroke="#fff" stroke-width="1.5"/>`
      +`<text x="${x}" y="${y}" text-anchor="middle" dominant-baseline="central" font-size="10" font-weight="700" font-family="${F}" fill="${numFill}">${i+1}</text></a>`;
  });
  // (d) vila navrchu: kolečko + domeček + jediný textový popisek na mapě
  svg+=`<circle cx="${vx}" cy="${vy}" r="12" fill="#33493a"/>`
    +`<path d="M${vx-4} ${vy+4.5} L${vx-4} ${vy-0.5} L${vx} ${vy-4.5} L${vx+4} ${vy-0.5} L${vx+4} ${vy+4.5} Z" fill="none" stroke="#fff" stroke-width="1.4" stroke-linejoin="round" stroke-linecap="round"/>`
    +`<text x="${vx}" y="${vy+22}" text-anchor="middle" font-size="9" font-weight="700" font-family="${F}" fill="#33493a">Villa Rudolf</text>`;
  // (e) severka vpravo nahoře (S = sever pro cs, N pro de/en)
  svg+=`<g stroke="#33493a" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round" fill="none"><path d="M${nx} 22 L${nx} 8"/><path d="M${nx-3.5} 12 L${nx} 8 L${nx+3.5} 12"/></g>`
    +`<text x="${nx}" y="34" text-anchor="middle" font-size="9" font-weight="700" font-family="${F}" fill="#33493a">${northLetter}</text>`;
  // (f) měřítko vlevo dole
  svg+=`<g stroke="#73786d" stroke-width="1" stroke-linecap="round"><path d="M${sx} ${sy} H${(sx+barPx).toFixed(1)}"/><path d="M${sx} ${sy-3} V${sy+3}"/><path d="M${(sx+barPx).toFixed(1)} ${sy-3} V${sy+3}"/></g>`
    +`<text x="${sx}" y="${sy-6}" font-size="8" font-family="${F}" fill="#73786d">${barKm} km</text>`;
  svg+=`</svg>`;

  // legenda pod mapou – stejné pořadí 1..9
  let key='<div class="mapkey">';
  trips.forEach((t,i)=>{
    const pick=pickIds.has(t.id);
    const short=esc(tt(t.name,lang).split('–')[0].split('(')[0].trim());
    const dist=t.byFoot?esc(L.mapFoot):esc(t.travelMin+' min');
    key+=`<a href="#${t.id}" class="mk${pick?' pick':''}" style="--acc:${t.accent}"><span class="n">${i+1}</span><span class="t">${short}</span><span class="d">${dist}</span></a>`;
  });
  key+='</div>';

  return `<div class="sec-h"><svg class="icon"><use href="#i-map"></use></svg><h2>${esc(L.mapTitle)}</h2></div>`
    +`<div class="mapwrap">${svg}<div class="mapcap">${esc(L.mapCaption)}</div>${key}</div>`;
}

      const adultsRaw=(document.getElementById('ef-adults')||{}).value;
      const kidsRaw=(document.getElementById('ef-kids')||{}).value;
      const np=parseParty(adultsRaw,kidsRaw);
      savePartyOverride(token,np);
      data.guest.party=np;
      render(data,token); // přerenderuj celé UI s novým party (plán se přepočítá)
    });
  }
}

(async function(){
  try{
    const token=qs.get('t')||'demo';
    const [guest,tripsRaw,forecast]=await Promise.all([
      loadGuest(token),
      fetch(CFG.TRIPS_URL).then(r=>r.json()),
      fetch(CFG.FORECAST_URL).then(r=>r.json()).catch(()=>null)
    ]);
    // lokální override skupiny (host si upravil partu; funguje i v demu)

  }catch(e){
    document.getElementById('app').innerHTML='<div class="loading">Průvodce se nepodařilo načíst. / Guide konnte nicht geladen werden.</div>';
    console.error(e);
  }
})();
